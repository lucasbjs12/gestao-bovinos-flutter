<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel — Gestão de Rebanho</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/lucasbjs12/gestao-bovinos-flutter/master/assets/images/marca.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root {
      --g900:#1B5E20; --g800:#2E7D32; --g700:#388E3C;
      --g600:#43A047; --g500:#4CAF50; --g400:#66BB6A; --g200:#A5D6A7; --g50:#E8F5E9;
      --dark:#071209; --text:#1c1c1e; --muted:#6c6c70;
      --border:#e5e7eb; --bg:#f7faf7; --card:#fff;
      --side-w:240px;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; }
    body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }

    /* ── LAYOUT ──────────────────────────── */
    .layout { display:flex; min-height:100vh; }

    /* ── SIDEBAR ─────────────────────────── */
    .sidebar {
      width:var(--side-w); min-height:100vh; position:fixed; top:0; left:0; z-index:100;
      background:linear-gradient(175deg,#0c2410 0%,var(--g800) 100%);
      display:flex; flex-direction:column;
      transition:transform .3s cubic-bezier(.4,0,.2,1);
    }
    .sidebar-brand {
      display:flex; align-items:center; gap:10px; padding:22px 18px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .sidebar-brand img { width:36px; height:36px; border-radius:9px; }
    .sidebar-brand-name { font-size:13px; font-weight:700; color:#fff; line-height:1.2; }
    .sidebar-brand-sub  { font-size:10px; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.07em; }
    .sidebar-nav { flex:1; padding:12px 0; overflow-y:auto; }
    .nav-sec { padding:14px 18px 6px; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.28); }
    .nav-item {
      display:flex; align-items:center; gap:11px; padding:11px 18px; cursor:pointer;
      color:rgba(255,255,255,.62); font-size:14px; font-weight:500;
      border-left:3px solid transparent; transition:all .2s; text-decoration:none;
    }
    .nav-item:hover { background:rgba(255,255,255,.07); color:#fff; }
    .nav-item.active { background:rgba(255,255,255,.12); color:#fff; border-left-color:var(--g400); font-weight:600; }
    .nav-item svg { flex-shrink:0; opacity:.7; }
    .nav-item.active svg { opacity:1; }
    .sidebar-footer { padding:16px 18px; border-top:1px solid rgba(255,255,255,.08); }
    .user-info { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
    .user-avatar {
      width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.12);
      display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:700; color:#fff; flex-shrink:0;
    }
    .user-email { font-size:12px; color:rgba(255,255,255,.5); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .btn-logout {
      width:100%; padding:9px; border:1px solid rgba(255,255,255,.15); border-radius:8px;
      background:transparent; color:rgba(255,255,255,.55); font-size:13px; font-family:inherit;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; transition:all .2s;
    }
    .btn-logout:hover { background:rgba(255,0,0,.12); border-color:rgba(255,80,80,.3); color:#ff8080; }

    /* ── MAIN ────────────────────────────── */
    .main { margin-left:var(--side-w); flex:1; display:flex; flex-direction:column; min-height:100vh; }
    .topbar {
      position:sticky; top:0; z-index:50; background:rgba(247,250,247,.92);
      backdrop-filter:blur(16px); border-bottom:1px solid var(--border);
      padding:14px 28px; display:flex; align-items:center; justify-content:space-between;
    }
    .topbar-title { font-size:17px; font-weight:700; }
    .fazenda-pill {
      display:inline-flex; align-items:center; gap:6px;
      background:var(--g50); color:var(--g800); font-size:12px; font-weight:600;
      padding:5px 12px; border-radius:100px;
    }
    .hamburger { display:none; background:none; border:none; cursor:pointer; padding:4px; color:var(--text); }
    .content { padding:28px; flex:1; }

    /* ── STAT CARDS ──────────────────────── */
    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
    @media(max-width:900px){ .stat-grid{ grid-template-columns:repeat(2,1fr); } }
    .stat-card {
      background:var(--card); border-radius:14px; padding:20px;
      border:1px solid var(--border); display:flex; align-items:flex-start; gap:14px; transition:box-shadow .2s;
    }
    .stat-card:hover { box-shadow:0 4px 20px rgba(0,0,0,.07); }
    .stat-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
    .ic-green{background:var(--g50)} .ic-blue{background:#EFF6FF} .ic-orange{background:#FFF7ED} .ic-purple{background:#F5F3FF}
    .stat-val { font-size:26px; font-weight:800; line-height:1; }
    .stat-lbl { font-size:12px; color:var(--muted); margin-top:4px; }

    /* ── SECTION CARD ────────────────────── */
    .sc { background:var(--card); border-radius:16px; border:1px solid var(--border); overflow:hidden; }
    .sc-head {
      padding:18px 22px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
    }
    .sc-title { font-size:15px; font-weight:700; }
    .sc + .sc { margin-top:20px; }

    /* ── FILTERS ─────────────────────────── */
    .filters { display:flex; gap:10px; flex-wrap:wrap; }
    .search-box {
      display:flex; align-items:center; gap:8px; background:var(--bg);
      border:1.5px solid var(--border); border-radius:9px; padding:8px 12px; min-width:190px;
    }
    .search-box svg { color:var(--muted); flex-shrink:0; }
    .search-box input { border:none; background:transparent; outline:none; font-size:13px; font-family:inherit; color:var(--text); width:100%; }
    select.fil {
      border:1.5px solid var(--border); border-radius:9px; padding:8px 12px;
      font-size:13px; font-family:inherit; color:var(--text); background:var(--bg); outline:none; cursor:pointer;
    }
    select.fil:focus { border-color:var(--g600); }

    /* ── TABLE ───────────────────────────── */
    .tbl-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    th {
      background:var(--bg); font-size:11px; font-weight:700; color:var(--muted);
      text-transform:uppercase; letter-spacing:.07em; padding:12px 16px;
      border-bottom:1px solid var(--border); text-align:left; white-space:nowrap;
    }
    td { padding:12px 16px; font-size:13px; border-bottom:1px solid var(--border); vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr.clickable:hover td { background:var(--g50); cursor:pointer; }
    .bfoto { width:34px; height:34px; border-radius:8px; object-fit:cover; background:var(--g50); display:flex; align-items:center; justify-content:center; font-size:18px; }
    .bfoto img { width:34px; height:34px; border-radius:8px; object-fit:cover; }
    .badge { display:inline-flex; padding:3px 9px; border-radius:100px; font-size:11px; font-weight:600; }
    .bg-green{background:var(--g50);color:var(--g800)} .bg-red{background:#FEF2F2;color:#DC2626}
    .bg-yellow{background:#FFFBEB;color:#D97706} .bg-gray{background:#F3F4F6;color:#6B7280}

    /* ── INVERNADA CARDS ─────────────────── */
    .inv-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; padding:20px; }
    .inv-card {
      background:var(--bg); border:1px solid var(--border); border-radius:14px; padding:22px;
      cursor:pointer; transition:transform .2s,box-shadow .2s,border-color .2s;
    }
    .inv-card:hover { transform:translateY(-4px); box-shadow:0 10px 30px rgba(0,0,0,.09); border-color:var(--g200); }
    .inv-card-head { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .inv-ico { width:44px; height:44px; background:var(--g50); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; }
    .inv-name { font-size:15px; font-weight:700; }
    .inv-ha   { font-size:12px; color:var(--muted); }
    .inv-stats { display:flex; gap:16px; margin-bottom:14px; }
    .inv-stat { flex:1; text-align:center; }
    .inv-stat-val { font-size:22px; font-weight:800; }
    .inv-stat-lbl { font-size:11px; color:var(--muted); }
    .lot-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .lot-fill { height:100%; border-radius:3px; transition:width .5s; }
    .lot-fill.ok{background:var(--g500)} .lot-fill.warn{background:#F59E0B} .lot-fill.over{background:#EF4444}
    .lot-lbl { font-size:11px; color:var(--muted); margin-top:5px; text-align:right; }

    /* ── EVENTO LIST ─────────────────────── */
    .ev-list { display:flex; flex-direction:column; }
    .ev-item {
      display:flex; align-items:center; gap:14px; padding:14px 22px;
      border-bottom:1px solid var(--border); transition:background .15s; cursor:pointer;
    }
    .ev-item:last-child { border-bottom:none; }
    .ev-item:hover { background:var(--g50); }
    .ev-ico { width:40px; height:40px; border-radius:10px; background:var(--g50); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .ev-tipo { font-size:14px; font-weight:600; }
    .ev-meta { font-size:12px; color:var(--muted); margin-top:2px; }
    .ev-date { margin-left:auto; font-size:12px; color:var(--muted); white-space:nowrap; }

    /* ── EMPTY / LOADING ─────────────────── */
    .empty,.loading-state {
      text-align:center; padding:60px 24px; color:var(--muted);
      display:flex; flex-direction:column; align-items:center; gap:12px;
    }
    .empty-ico { font-size:48px; }
    .loader { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--g600); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── DRAWER ──────────────────────────── */
    .drw-ov {
      position:fixed; inset:0; background:rgba(0,0,0,.35);
      z-index:300; opacity:0; pointer-events:none;
      transition:opacity .3s; backdrop-filter:blur(3px);
    }
    .drw-ov.show { opacity:1; pointer-events:all; }
    .drw {
      position:fixed; top:0; right:0; bottom:0; z-index:301;
      width:min(500px,100vw); background:#fff;
      box-shadow:-8px 0 48px rgba(0,0,0,.18);
      transform:translateX(100%); transition:transform .35s cubic-bezier(.4,0,.2,1);
      display:flex; flex-direction:column;
    }
    .drw.open { transform:translateX(0); }
    .drw-head {
      padding:18px 20px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
      background:var(--bg);
    }
    .drw-head-left { display:flex; align-items:center; gap:10px; }
    .drw-head-ico { font-size:22px; }
    .drw-head-title { font-size:16px; font-weight:700; }
    .drw-head-sub   { font-size:12px; color:var(--muted); margin-top:1px; }
    .drw-close {
      width:32px; height:32px; border:none; background:var(--border);
      border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;
      color:var(--muted); font-size:20px; line-height:1; transition:background .2s;
    }
    .drw-close:hover { background:#d1d5db; color:var(--text); }
    .drw-body { flex:1; overflow-y:auto; padding:0; }

    /* Drawer inner sections */
    .drw-photo {
      width:100%; height:200px; object-fit:cover; display:block; background:var(--g50);
    }
    .drw-photo-ph {
      width:100%; height:200px; background:linear-gradient(135deg,var(--g50),var(--g200));
      display:flex; align-items:center; justify-content:center; font-size:72px;
    }
    .drw-section { padding:20px; border-bottom:1px solid var(--border); }
    .drw-section:last-child { border-bottom:none; }
    .drw-section-title { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:14px; }
    .drw-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .drw-field label { display:block; font-size:11px; color:var(--muted); margin-bottom:3px; }
    .drw-field span  { font-size:14px; font-weight:600; color:var(--text); }
    .drw-field.full  { grid-column:1/-1; }

    .mini-row {
      display:flex; align-items:center; gap:12px; padding:10px 0;
      border-bottom:1px solid var(--border); font-size:13px;
    }
    .mini-row:last-child { border-bottom:none; }
    .mini-brinco { font-weight:700; min-width:70px; }
    .mini-cat    { color:var(--muted); flex:1; }
    .mini-peso   { color:var(--muted); white-space:nowrap; }

    /* Overlay for sidebar on mobile */
    .mob-ov {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.4);
      z-index:90; backdrop-filter:blur(2px);
    }
    .mob-ov.show { display:block; }

    /* ── PDF BUTTON ─────────────────────── */
    .btn-pdf {
      display:inline-flex; align-items:center; gap:7px;
      background:var(--g800); color:#fff; font-size:13px; font-weight:600;
      padding:9px 16px; border-radius:9px; border:none; cursor:pointer;
      font-family:inherit; transition:all .2s; white-space:nowrap;
    }
    .btn-pdf:hover { background:var(--g900); transform:translateY(-1px); box-shadow:0 6px 20px rgba(46,125,50,.3); }
    .btn-pdf:active { transform:translateY(0); }

    /* ── PDF MODAL ───────────────────────── */
    .pdf-ov {
      position:fixed; inset:0; background:rgba(0,0,0,.45);
      z-index:400; opacity:0; pointer-events:none;
      transition:opacity .3s; backdrop-filter:blur(4px);
    }
    .pdf-ov.show { opacity:1; pointer-events:all; }
    .pdf-modal {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-48%) scale(.96);
      z-index:401; width:min(500px,calc(100vw - 32px));
      background:#fff; border-radius:20px;
      box-shadow:0 32px 80px rgba(0,0,0,.28);
      transition:transform .32s cubic-bezier(.22,1,.36,1), opacity .3s;
      opacity:0; pointer-events:none;
    }
    .pdf-modal.show { transform:translate(-50%,-50%) scale(1); opacity:1; pointer-events:all; }
    .pdf-mhead {
      padding:20px 24px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      background:linear-gradient(135deg,var(--g800),var(--g700));
      border-radius:20px 20px 0 0;
    }
    .pdf-mhead h2 { font-size:16px; font-weight:700; color:#fff; display:flex; align-items:center; gap:9px; }
    .pdf-mclose {
      width:32px; height:32px; border:none; background:rgba(255,255,255,.15);
      border-radius:8px; cursor:pointer; color:#fff; font-size:20px; line-height:1;
      display:flex; align-items:center; justify-content:center; transition:background .2s;
    }
    .pdf-mclose:hover { background:rgba(255,255,255,.25); }
    .pdf-mbody { padding:24px; display:flex; flex-direction:column; gap:22px; }
    .pdf-group-title { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:12px; }
    .pdf-checks { display:flex; flex-direction:column; gap:10px; }
    .check-lbl {
      display:flex; align-items:center; gap:10px; cursor:pointer;
      font-size:14px; font-weight:500; color:var(--text); padding:10px 14px;
      background:var(--bg); border:1.5px solid var(--border); border-radius:10px;
      transition:all .2s; user-select:none;
    }
    .check-lbl:hover { border-color:var(--g200); background:var(--g50); }
    .check-lbl input[type=checkbox] { width:17px; height:17px; accent-color:var(--g700); cursor:pointer; flex-shrink:0; }
    .check-lbl input:checked + .check-lbl-text { color:var(--g800); }
    .pdf-selects { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .pdf-fld label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; }
    .pdf-sel {
      width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:9px;
      font-size:13px; font-family:inherit; color:var(--text); background:var(--bg); outline:none;
      transition:border-color .2s;
    }
    .pdf-sel:focus { border-color:var(--g600); }
    .pdf-preview {
      background:var(--bg); border:1px solid var(--border); border-radius:12px;
      padding:14px 16px; display:flex; align-items:center; gap:12px;
    }
    .pdf-prev-ico { font-size:28px; }
    .pdf-prev-title { font-size:14px; font-weight:700; }
    .pdf-prev-sub   { font-size:12px; color:var(--muted); margin-top:2px; }
    .pdf-mfoot {
      padding:16px 24px; border-top:1px solid var(--border);
      display:flex; align-items:center; justify-content:flex-end; gap:10px;
    }
    .btn-cancel-pdf {
      padding:10px 20px; border:1.5px solid var(--border); border-radius:9px;
      background:transparent; font-size:14px; font-weight:600; font-family:inherit;
      cursor:pointer; color:var(--muted); transition:all .2s;
    }
    .btn-cancel-pdf:hover { border-color:#d1d5db; color:var(--text); }
    .btn-gerar-pdf {
      display:inline-flex; align-items:center; gap:8px;
      padding:10px 22px; border:none; border-radius:9px;
      background:var(--g800); color:#fff; font-size:14px; font-weight:700;
      font-family:inherit; cursor:pointer; transition:all .2s;
    }
    .btn-gerar-pdf:hover { background:var(--g900); }
    .btn-gerar-pdf:disabled { opacity:.6; cursor:not-allowed; }

    /* ── RESPONSIVE ──────────────────────── */
    @media(max-width:768px){
      .sidebar { transform:translateX(-100%); }
      .sidebar.open { transform:translateX(0); box-shadow:8px 0 40px rgba(0,0,0,.3); }
      .main { margin-left:0; }
      .hamburger { display:block; }
      .content { padding:16px; }
      .topbar { padding:12px 16px; }
      .stat-grid { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- PDF Modal -->
<div class="pdf-ov"    id="pdf-ov" onclick="closePdfModal()"></div>
<div class="pdf-modal" id="pdf-modal">
  <div class="pdf-mhead">
    <h2>
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Gerar Relatório PDF
    </h2>
    <button class="pdf-mclose" onclick="closePdfModal()">×</button>
  </div>
  <div class="pdf-mbody">
    <div>
      <div class="pdf-group-title">Seções a incluir</div>
      <div class="pdf-checks">
        <label class="check-lbl"><input type="checkbox" id="pdf-bovinos" checked /><span class="check-lbl-text">🐄 &nbsp;Bovinos</span></label>
        <label class="check-lbl"><input type="checkbox" id="pdf-invernadas" checked /><span class="check-lbl-text">🌿 &nbsp;Invernadas</span></label>
        <label class="check-lbl"><input type="checkbox" id="pdf-eventos" checked /><span class="check-lbl-text">💉 &nbsp;Eventos sanitários</span></label>
      </div>
    </div>
    <div>
      <div class="pdf-group-title">Filtros</div>
      <div class="pdf-selects">
        <div class="pdf-fld">
          <label>Status dos animais</label>
          <select class="pdf-sel" id="pdf-status">
            <option value="">Todos os animais</option>
            <option value="Ativo">Só ativos</option>
            <option value="Baixado">Só baixados</option>
          </select>
        </div>
        <div class="pdf-fld">
          <label>Invernada</label>
          <select class="pdf-sel" id="pdf-inv">
            <option value="">Todas as invernadas</option>
          </select>
        </div>
      </div>
    </div>
    <div class="pdf-preview">
      <div class="pdf-prev-ico">📄</div>
      <div>
        <div class="pdf-prev-title">Relatório gerado em PDF</div>
        <div class="pdf-prev-sub">Inclui capa, estatísticas, tabelas e rodapé com paginação</div>
      </div>
    </div>
  </div>
  <div class="pdf-mfoot">
    <button class="btn-cancel-pdf" onclick="closePdfModal()">Cancelar</button>
    <button class="btn-gerar-pdf" id="btn-gerar-pdf" onclick="gerarPDF()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Baixar PDF
    </button>
  </div>
</div>

<!-- Mobile sidebar overlay -->

<aside class="sidebar" id="sidebar">

    </button>

<!-- ── MAIN ─────────────────────────────────────────── -->
<div class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:14px">
      <button class="hamburger" onclick="openSidebar()">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="topbar-title" id="topbar-title">Início</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn-pdf" onclick="openPdfModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Gerar PDF
      </button>

        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="3,11 12,2 21,11"/><path d="M5 11v8a1 1 0 001 1h12a1 1 0 001-1v-8"/></svg>
        <span id="fazenda-nome">Minha Fazenda</span>
      </div>
    </div>
  </header>
  <div class="content" id="content">
    <div class="loading-state"><div class="loader"></div><p>Carregando…</p></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { getFirestore, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const app  = initializeApp({
  apiKey:"AIzaSyDfyGdkHO_MU-tzO75UJyMzy9UsZl-2EKE",
  authDomain:"gestaobovinosapp.firebaseapp.com",
  projectId:"gestaobovinosapp",
  storageBucket:"gestaobovinosapp.firebasestorage.app",
  messagingSenderId:"23784741029",
  appId:"1:23784741029:web:120a487f5b39276ca6554c"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ────────────────────────────────────────────────
let uid = null;
const cache = { bovinos:null, invernadas:null, eventos:null };
let invMap  = {}; // local id → descricao
const dm    = {};  // detail map: key → data object

// ── Auth ─────────────────────────────────────────────────
onAuthStateChanged(auth, async u => {
  if (!u) { location.href = '/login.html'; return; }
  uid = u.uid;
  const email = u.email ?? '';
  document.getElementById('user-email').textContent = email;
  document.getElementById('avatar').textContent = email[0].toUpperCase();
  document.getElementById('fazenda-nome').textContent = u.displayName || 'Minha Fazenda';
  await loadInvernadas();
  renderSection('home');
});

// ── Firestore ─────────────────────────────────────────────
async function getCol(name) {
  return (await getDocs(collection(db, 'fazendas', uid, name))).docs.map(d => d.data());
}
async function loadBovinos()    { return cache.bovinos    ??= await getCol('bovinos'); }
async function loadInvernadas() {
  if (!cache.invernadas) {
    cache.invernadas = await getCol('invernadas');
    cache.invernadas.forEach(i => { invMap[i.id] = i.descricao; });
  }
  return cache.invernadas;
}
async function loadEventos() {
  if (!cache.eventos) {
    cache.eventos = await getCol('eventos_sanitarios');
    cache.eventos.sort((a,b) => (b.dataEventoMillis||0)-(a.dataEventoMillis||0));
  }
  return cache.eventos;
}

// ── Navigation ────────────────────────────────────────────
const titles = { home:'Início', bovinos:'Bovinos', invernadas:'Invernadas', sanidade:'Sanidade' };
window.nav = (el, s) => {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('topbar-title').textContent = titles[s];
  closeSidebar(); closeDrawer();
  renderSection(s);
};
window.openSidebar  = () => { document.getElementById('sidebar').classList.add('open');  document.getElementById('mob-ov').classList.add('show'); };
window.closeSidebar = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('mob-ov').classList.remove('show'); };
window.sair = async () => { await signOut(auth); location.href = '/'; };

// ── Drawer ────────────────────────────────────────────────
window.openDrawer = (ico, title, sub, html) => {
  document.getElementById('drw-ico').textContent   = ico;
  document.getElementById('drw-title').textContent = title;
  document.getElementById('drw-sub').textContent   = sub;
  document.getElementById('drw-body').innerHTML    = html;
  document.getElementById('drw-ov').classList.add('show');
  document.getElementById('drw').classList.add('open');
};
window.closeDrawer = () => {
  document.getElementById('drw-ov').classList.remove('show');
  document.getElementById('drw').classList.remove('open');
};

// ── Render dispatcher ─────────────────────────────────────
async function renderSection(s) {
  const el = document.getElementById('content');
  el.innerHTML = `<div class="loading-state"><div class="loader"></div><p>Carregando…</p></div>`;
  if (s==='home')       await renderHome(el);
  if (s==='bovinos')    await renderBovinos(el);
  if (s==='invernadas') await renderInvernadas(el);
  if (s==='sanidade')   await renderSanidade(el);
}

// ── HOME ──────────────────────────────────────────────────
async function renderHome(el) {
  const [bovinos, invernadas, eventos] = await Promise.all([loadBovinos(), loadInvernadas(), loadEventos()]);
  const ativos   = bovinos.filter(b => b.status==='Ativo').length;
  const recentes = [...bovinos].sort((a,b)=>(b.updatedAt?.seconds||0)-(a.updatedAt?.seconds||0)).slice(0,8);

  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-icon ic-green">🐄</div><div><div class="stat-val">${bovinos.length}</div><div class="stat-lbl">Total de animais</div></div></div>
      <div class="stat-card"><div class="stat-icon ic-blue">✅</div><div><div class="stat-val">${ativos}</div><div class="stat-lbl">Animais ativos</div></div></div>
      <div class="stat-card"><div class="stat-icon ic-orange">🌿</div><div><div class="stat-val">${invernadas.length}</div><div class="stat-lbl">Invernadas</div></div></div>
      <div class="stat-card"><div class="stat-icon ic-purple">💉</div><div><div class="stat-val">${eventos.length}</div><div class="stat-lbl">Eventos sanitários</div></div></div>
    </div>
    <div class="sc">
      <div class="sc-head"><span class="sc-title">Animais recentes</span><span style="font-size:12px;color:var(--muted)">Clique para ver detalhes</span></div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Foto</th><th>Brinco</th><th>Categoria</th><th>Invernada</th><th>Peso</th><th>Status</th></tr></thead>
        <tbody>${recentes.length ? recentes.map((b,i)=>bovinoRow(b,`h_${i}`)).join('') : `<tr><td colspan="6"><div class="empty"><div class="empty-ico">🐄</div><p>Nenhum animal cadastrado.</p></div></td></tr>`}</tbody>
      </table></div>
    </div>
    ${eventos.length ? `
    <div class="sc">
      <div class="sc-head"><span class="sc-title">Últimos eventos sanitários</span><span style="font-size:12px;color:var(--muted)">Clique para ver detalhes</span></div>
      <div class="ev-list">${eventos.slice(0,5).map((e,i)=>eventoItem(e,`h_ev_${i}`)).join('')}</div>
    </div>` : ''}`;
}

// ── BOVINOS ───────────────────────────────────────────────
async function renderBovinos(el) {
  const bovinos = await loadBovinos();
  const cats    = [...new Set(bovinos.map(b=>b.categoria).filter(Boolean))].sort();
  const invs    = [...new Set(bovinos.map(b=>invMap[b.invernadaId]).filter(Boolean))].sort();

  el.innerHTML = `
    <div class="sc">
      <div class="sc-head">
        <span class="sc-title">Bovinos <span style="color:var(--muted);font-weight:400;font-size:13px" id="cnt"></span></span>
        <div class="filters">
          <div class="search-box">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input placeholder="Buscar brinco…" id="q" oninput="fbov()" />
          </div>
          <select class="fil" id="fc" onchange="fbov()"><option value="">Todas categorias</option>${cats.map(c=>`<option>${c}</option>`).join('')}</select>
          <select class="fil" id="fi" onchange="fbov()"><option value="">Todas invernadas</option>${invs.map(n=>`<option>${n}</option>`).join('')}</select>
          <select class="fil" id="fs" onchange="fbov()"><option value="">Todos status</option><option>Ativo</option><option>Baixado</option></select>
        </div>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Foto</th><th>Brinco</th><th>Categoria</th><th>Sexo</th><th>Invernada</th><th>Peso</th><th>Status</th></tr></thead>
        <tbody id="btbody"></tbody>
      </table></div>
    </div>`;
  window.__bov = bovinos; fbov();
}

window.fbov = () => {
  const q  = (document.getElementById('q')?.value  ?? '').toLowerCase();
  const fc = document.getElementById('fc')?.value  ?? '';
  const fi = document.getElementById('fi')?.value  ?? '';
  const fs = document.getElementById('fs')?.value  ?? '';
  const list = (window.__bov||[]).filter(b =>
    (!q  || (b.numeroBrinco||'').toLowerCase().includes(q)) &&
    (!fc || b.categoria === fc) &&
    (!fi || invMap[b.invernadaId] === fi) &&
    (!fs || b.status === fs)
  );
  const tbody = document.getElementById('btbody');
  const cnt   = document.getElementById('cnt');
  if (!tbody) return;
  cnt && (cnt.textContent = `(${list.length})`);
  tbody.innerHTML = list.length
    ? list.map((b,i)=>bovinoRow(b,`bov_${i}`)).join('')
    : `<tr><td colspan="7"><div class="empty"><div class="empty-ico">🔍</div><p>Nenhum animal encontrado.</p></div></td></tr>`;
};

// ── INVERNADAS ────────────────────────────────────────────
async function renderInvernadas(el) {
  const [invernadas, bovinos] = await Promise.all([loadInvernadas(), loadBovinos()]);
  const cntMap = {};
  bovinos.filter(b=>b.status==='Ativo').forEach(b => { if (b.invernadaId) cntMap[b.invernadaId] = (cntMap[b.invernadaId]||0)+1; });

  el.innerHTML = invernadas.length
    ? `<div class="inv-grid">${invernadas.map((inv,i)=>{
        const n   = cntMap[inv.id]||0;
        const ha  = inv.hectares||0;
        const max = ha*1.5;
        const pct = max>0 ? Math.min(Math.round(n/max*100),100):0;
        const cls = pct>=100?'over':pct>=75?'warn':'ok';
        const k   = `inv_${i}`; dm[k] = inv;
        return `<div class="inv-card" onclick="openInvernadaDetail('${k}')">
          <div class="inv-card-head">
            <div class="inv-ico">🌿</div>
            <div><div class="inv-name">${inv.descricao}</div><div class="inv-ha">${ha?ha+' ha':'Área não definida'}</div></div>
          </div>
          <div class="inv-stats">
            <div class="inv-stat"><div class="inv-stat-val">${n}</div><div class="inv-stat-lbl">Animais</div></div>
            ${ha?`<div class="inv-stat"><div class="inv-stat-val">${(n/ha).toFixed(1)}</div><div class="inv-stat-lbl">UA/ha</div></div>`:''}
          </div>
          ${ha?`<div class="lot-bar"><div class="lot-fill ${cls}" style="width:${pct}%"></div></div><div class="lot-lbl">Lotação: ${pct}%</div>`:''}
          ${inv.observacoes?`<p style="font-size:12px;color:var(--muted);margin-top:10px">${inv.observacoes}</p>`:''}
        </div>`;
      }).join('')}</div>`
    : `<div class="sc"><div class="empty"><div class="empty-ico">🌿</div><p>Nenhuma invernada cadastrada.</p></div></div>`;
}

// ── SANIDADE ──────────────────────────────────────────────
async function renderSanidade(el) {
  const eventos = await loadEventos();
  el.innerHTML = `
    <div class="sc">
      <div class="sc-head"><span class="sc-title">Eventos sanitários (${eventos.length})</span><span style="font-size:12px;color:var(--muted)">Clique para ver detalhes</span></div>
      ${eventos.length
        ? `<div class="ev-list">${eventos.map((e,i)=>eventoItem(e,`san_${i}`)).join('')}</div>`
        : `<div class="empty"><div class="empty-ico">💉</div><p>Nenhum evento registrado.</p></div>`}
    </div>`;
}

// ── Row / item helpers ─────────────────────────────────────
function bovinoRow(b, k) {
  dm[k] = b;
  const scls = b.status==='Ativo' ? 'bg-green' : 'bg-red';
  const inv  = invMap[b.invernadaId]||'—';
  const peso = b.pesoAtualKg ? `${b.pesoAtualKg} kg` : '<span style="color:var(--muted)">—</span>';
  const foto = b.foto
    ? `<div class="bfoto"><img src="${b.foto}" onerror="this.parentElement.innerHTML='🐄'" /></div>`
    : `<div class="bfoto">🐄</div>`;
  return `<tr class="clickable" onclick="openBovinoDetail('${k}')">
    <td>${foto}</td>
    <td><strong>${b.numeroBrinco||'—'}</strong></td>
    <td>${b.categoria||'—'}</td>
    <td>${b.sexo||'—'}</td>
    <td>${inv}</td>
    <td>${peso}</td>
    <td><span class="badge ${scls}">${b.status||'—'}</span></td>
  </tr>`;
}

const tipoIco = t => ({Vacina:'💉',Vermifugação:'🪱',Tratamento:'🩺',Pesagem:'⚖️',Curativo:'🩹'}[t]??'📋');

function eventoItem(e, k) {
  dm[k] = e;
  const n = (e.bovinoIds||[]).length;
  const prod = e.produtoUtilizado ? ` · ${e.produtoUtilizado}` : '';
  return `<div class="ev-item" onclick="openEventoDetail('${k}')">
    <div class="ev-ico">${tipoIco(e.tipo)}</div>
    <div>
      <div class="ev-tipo">${e.tipo||'Evento'}</div>
      <div class="ev-meta">${n>0?`${n} animal${n!==1?'is':''}`:''}${prod}${e.responsavel?` · ${e.responsavel}`:''}</div>
    </div>
    <div class="ev-date">${e.dataEvento||''}</div>
  </div>`;
}

// ── Detail drawers ────────────────────────────────────────
window.openBovinoDetail = async k => {
  const b = dm[k]; if (!b) return;
  const eventos = await loadEventos();
  const evDoBovino = eventos.filter(e => (e.bovinoIds||[]).includes(b.id));
  const inv = invMap[b.invernadaId] || '—';
  const scls = b.status==='Ativo' ? 'bg-green' : 'bg-red';

  const fotoHtml = b.foto
    ? `<img class="drw-photo" src="${b.foto}" onerror="this.outerHTML='<div class=\\'drw-photo-ph\\'>🐄</div>'" />`
    : `<div class="drw-photo-ph">🐄</div>`;

  const campo = (lbl, val) => val ? `<div class="drw-field"><label>${lbl}</label><span>${val}</span></div>` : '';

  const evsHtml = evDoBovino.length
    ? `<div class="drw-section">
        <div class="drw-section-title">Eventos sanitários (${evDoBovino.length})</div>
        <div class="ev-list">${evDoBovino.map((e,i) => {
          const ek = `bdrw_${i}`; dm[ek] = e;
          const n = (e.bovinoIds||[]).length;
          return `<div class="ev-item" onclick="openEventoDetail('${ek}')">
            <div class="ev-ico">${tipoIco(e.tipo)}</div>
            <div>
              <div class="ev-tipo">${e.tipo||'Evento'}</div>
              <div class="ev-meta">${e.produtoUtilizado||''}${e.dosagem?' · '+e.dosagem:''}</div>
            </div>
            <div class="ev-date">${e.dataEvento||''}</div>
          </div>`;
        }).join('')}</div>
       </div>`
    : `<div class="drw-section"><p style="font-size:13px;color:var(--muted)">Nenhum evento registrado para este animal.</p></div>`;

  openDrawer('🐄', b.numeroBrinco || 'Animal', b.categoria || '', `
    ${fotoHtml}
    <div class="drw-section">
      <div class="drw-section-title">Identificação</div>
      <div class="drw-grid">
        ${campo('Brinco',      b.numeroBrinco)}
        ${campo('Categoria',   b.categoria)}
        ${campo('Sexo',        b.sexo)}
        ${campo('Raça',        b.raca)}
        ${campo('Pelagem',     b.pelagem)}
        ${campo('Nascimento',  b.dataNascimento)}
        ${campo('Peso atual',  b.pesoAtualKg ? b.pesoAtualKg+' kg' : null)}
        ${campo('Invernada',   inv !== '—' ? inv : null)}
        <div class="drw-field"><label>Status</label><span class="badge ${scls}">${b.status||'—'}</span></div>
        ${b.codigoEpc ? campo('Código EPC', b.codigoEpc) : ''}
        ${b.codigoInterno ? campo('Código interno', b.codigoInterno) : ''}
        ${b.origem ? `<div class="drw-field full">${campo('Origem', b.origem)}</div>` : ''}
        ${b.observacoes ? `<div class="drw-field full"><label>Observações</label><span>${b.observacoes}</span></div>` : ''}
      </div>
    </div>
    ${evsHtml}
  `);
};

window.openInvernadaDetail = async k => {
  const inv = dm[k]; if (!inv) return;
  const bovinos = await loadBovinos();
  const animais = bovinos.filter(b => b.invernadaId === inv.id);
  const ativos  = animais.filter(b => b.status === 'Ativo');
  const ha  = inv.hectares || 0;
  const max = ha * 1.5;
  const pct = max > 0 ? Math.min(Math.round(ativos.length/max*100), 100) : 0;
  const cls = pct>=100?'over':pct>=75?'warn':'ok';

  const fotoHtml = inv.urlFoto
    ? `<img class="drw-photo" src="${inv.urlFoto}" onerror="this.outerHTML='<div class=\\'drw-photo-ph\\'>🌿</div>'" />`
    : `<div class="drw-photo-ph">🌿</div>`;

  const animaisList = animais.length
    ? animais.map((b,i) => {
        const ak = `idrw_${i}`; dm[ak] = b;
        return `<div class="mini-row" style="cursor:pointer" onclick="openBovinoDetail('${ak}')">
          <span class="mini-brinco">${b.numeroBrinco||'—'}</span>
          <span class="mini-cat">${b.categoria||'—'}</span>
          <span class="mini-peso">${b.pesoAtualKg ? b.pesoAtualKg+' kg' : '—'}</span>
          <span class="badge ${b.status==='Ativo'?'bg-green':'bg-red'}" style="margin-left:auto">${b.status||'—'}</span>
        </div>`;
      }).join('')
    : `<p style="font-size:13px;color:var(--muted);padding:16px 0">Nenhum animal nesta invernada.</p>`;

  openDrawer('🌿', inv.descricao, ha ? ha+' hectares' : 'Área não definida', `
    ${fotoHtml}
    <div class="drw-section">
      <div class="drw-section-title">Informações</div>
      <div class="drw-grid">
        <div class="drw-field"><label>Total de animais</label><span>${animais.length}</span></div>
        <div class="drw-field"><label>Animais ativos</label><span>${ativos.length}</span></div>
        ${ha ? `<div class="drw-field"><label>Área</label><span>${ha} ha</span></div>` : ''}
        ${ha ? `<div class="drw-field"><label>UA/ha</label><span>${(ativos.length/ha).toFixed(2)}</span></div>` : ''}
      </div>
      ${ha ? `
      <div style="margin-top:16px">
        <div class="lot-bar" style="height:8px"><div class="lot-fill ${cls}" style="width:${pct}%"></div></div>
        <div class="lot-lbl">Lotação: ${pct}% da capacidade estimada</div>
      </div>` : ''}
      ${inv.observacoes ? `<div style="margin-top:14px;font-size:13px;color:var(--muted)">${inv.observacoes}</div>` : ''}
    </div>
    <div class="drw-section">
      <div class="drw-section-title">Animais (${animais.length})</div>
      ${animaisList}
    </div>
  `);
};

// ── PDF Modal ────────────────────────────────────────────
window.openPdfModal = async () => {
  // Populate invernada filter
  const invs = await loadInvernadas();
  const sel  = document.getElementById('pdf-inv');
  sel.innerHTML = '<option value="">Todas as invernadas</option>' +
    invs.map(i => `<option value="${i.id}">${i.descricao}</option>`).join('');
  document.getElementById('pdf-ov').classList.add('show');
  document.getElementById('pdf-modal').classList.add('show');
};
window.closePdfModal = () => {
  document.getElementById('pdf-ov').classList.remove('show');
  document.getElementById('pdf-modal').classList.remove('show');
};

window.gerarPDF = async () => {
  const btn = document.getElementById('btn-gerar-pdf');
  btn.disabled = true;
  btn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg> Gerando…';

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const [bovinos, invernadas, eventos] = await Promise.all([loadBovinos(), loadInvernadas(), loadEventos()]);

    const filtStatus = document.getElementById('pdf-status').value;
    const filtInvId  = document.getElementById('pdf-inv').value;
    const inclBov    = document.getElementById('pdf-bovinos').checked;
    const inclInv    = document.getElementById('pdf-invernadas').checked;
    const inclEv     = document.getElementById('pdf-eventos').checked;

    let bovFiltrados = bovinos;
    if (filtStatus) bovFiltrados = bovFiltrados.filter(b => b.status === filtStatus);
    if (filtInvId)  bovFiltrados = bovFiltrados.filter(b => String(b.invernadaId) === filtInvId);

    const fazNome  = document.getElementById('fazenda-nome').textContent;
    const dataHoje = new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
    const G800 = [46,125,50]; const GOLD = [200,168,75]; const WHITE = [255,255,255];

    // ── Capa / Header ───────────────────────────────────
    doc.setFillColor(...G800);
    doc.rect(0, 0, 210, 44, 'F');

    // Logo circle
    doc.setFillColor(...GOLD);
    doc.circle(22, 22, 11, 'F');
    doc.setTextColor(...WHITE);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.text('GR', 22, 26, { align:'center' });

    // Títulos
    doc.setTextColor(...WHITE);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(18);
    doc.text('Gestão de Rebanho', 38, 18);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(11);
    doc.text('Relatório do Rebanho Bovino', 38, 26);
    doc.setFontSize(9);
    doc.setTextColor(200, 230, 200);
    doc.text(`${fazNome}  ·  ${dataHoje}`, 38, 34);

    // ── Stats bar ────────────────────────────────────────
    const ativos  = bovinos.filter(b => b.status === 'Ativo').length;
    const statVals = [bovinos.length, ativos, invernadas.length, eventos.length];
    const statLbls = ['Total de animais', 'Animais ativos', 'Invernadas', 'Eventos sanitários'];
    const sw = 210 / 4;

    doc.setFillColor(247, 250, 247);
    doc.rect(0, 44, 210, 24, 'F');

    statVals.forEach((v, i) => {
      const cx = i * sw + sw / 2;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(17);
      doc.setTextColor(...G800);
      doc.text(String(v), cx, 55, { align:'center' });
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7);
      doc.setTextColor(100, 100, 110);
      doc.text(statLbls[i], cx, 62, { align:'center' });
      if (i < 3) {
        doc.setDrawColor(220, 220, 220);
        doc.line((i+1)*sw, 46, (i+1)*sw, 66);
      }
    });

    let y = 78;

    // ── Bovinos ──────────────────────────────────────────
    if (inclBov && bovFiltrados.length) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.setTextColor(...G800);
      doc.text(`Bovinos  (${bovFiltrados.length})`, 14, y);

      doc.autoTable({
        startY: y + 3,
        head: [['Brinco','Categoria','Sexo','Raça','Peso (kg)','Invernada','Status']],
        body: bovFiltrados.map(b => [
          b.numeroBrinco || '—',
          b.categoria    || '—',
          b.sexo         || '—',
          b.raca         || '—',
          b.pesoAtualKg  || '—',
          invMap[b.invernadaId] || '—',
          b.status       || '—',
        ]),
        headStyles: { fillColor:G800, textColor:WHITE, fontStyle:'bold', fontSize:8 },
        bodyStyles: { fontSize:8, textColor:[28,28,30] },
        alternateRowStyles: { fillColor:[247,250,247] },
        didParseCell: data => {
          if (data.section === 'body' && data.column.index === 6) {
            data.cell.styles.fontStyle = 'bold';
            data.cell.styles.textColor = data.cell.raw === 'Ativo' ? [27,94,32] : [185,28,28];
          }
        },
        margin: { left:14, right:14 },
      });
      y = doc.lastAutoTable.finalY + 14;
    }

    // ── Invernadas ───────────────────────────────────────
    if (inclInv && invernadas.length) {
      if (y > 240) { doc.addPage(); y = 20; }
      const cntMap = {};
      bovinos.filter(b => b.status === 'Ativo').forEach(b => {
        if (b.invernadaId) cntMap[b.invernadaId] = (cntMap[b.invernadaId]||0) + 1;
      });

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.setTextColor(...G800);
      doc.text(`Invernadas  (${invernadas.length})`, 14, y);

      doc.autoTable({
        startY: y + 3,
        head: [['Nome','Hectares','Animais ativos','UA / ha','Lotação']],
        body: invernadas.map(inv => {
          const n   = cntMap[inv.id] || 0;
          const ha  = inv.hectares || 0;
          const max = ha * 1.5;
          const pct = max > 0 ? Math.round(n / max * 100) : 0;
          return [
            inv.descricao || '—',
            ha ? `${ha} ha` : '—',
            n,
            ha ? (n / ha).toFixed(2) : '—',
            ha ? `${pct}%` : '—',
          ];
        }),
        headStyles: { fillColor:G800, textColor:WHITE, fontStyle:'bold', fontSize:8 },
        bodyStyles: { fontSize:8, textColor:[28,28,30] },
        alternateRowStyles: { fillColor:[247,250,247] },
        didParseCell: data => {
          if (data.section === 'body' && data.column.index === 4 && data.cell.raw !== '—') {
            const pct = parseInt(data.cell.raw);
            data.cell.styles.fontStyle = 'bold';
            data.cell.styles.textColor = pct >= 100 ? [185,28,28] : pct >= 75 ? [180,100,0] : [27,94,32];
          }
        },
        margin: { left:14, right:14 },
      });
      y = doc.lastAutoTable.finalY + 14;
    }

    // ── Eventos sanitários ───────────────────────────────
    if (inclEv && eventos.length) {
      if (y > 220) { doc.addPage(); y = 20; }

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.setTextColor(...G800);
      doc.text(`Eventos Sanitários  (${eventos.length})`, 14, y);

      doc.autoTable({
        startY: y + 3,
        head: [['Tipo','Data','Produto','Dosagem','Animais','Responsável']],
        body: eventos.map(e => [
          e.tipo              || '—',
          e.dataEvento        || '—',
          e.produtoUtilizado  || '—',
          e.dosagem           || '—',
          (e.bovinoIds||[]).length || '—',
          e.responsavel       || '—',
        ]),
        headStyles: { fillColor:G800, textColor:WHITE, fontStyle:'bold', fontSize:8 },
        bodyStyles: { fontSize:8, textColor:[28,28,30] },
        alternateRowStyles: { fillColor:[247,250,247] },
        margin: { left:14, right:14 },
      });
    }

    // ── Rodapé em todas as páginas ───────────────────────
    const total = doc.internal.getNumberOfPages();
    for (let i = 1; i <= total; i++) {
      doc.setPage(i);
      doc.setDrawColor(220, 220, 220);
      doc.line(14, 287, 196, 287);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(150, 150, 155);
      doc.text(`Gestão de Rebanho  ·  Gerado em ${dataHoje}`, 14, 291);
      doc.text(`Página ${i} de ${total}`, 196, 291, { align:'right' });
    }

    const fname = `rebanho-${new Date().toISOString().slice(0,10)}.pdf`;
    doc.save(fname);
    closePdfModal();

  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Baixar PDF';
  }
};

window.openEventoDetail = async k => {
  const e = dm[k]; if (!e) return;
  const bovinos  = await loadBovinos();
  const idxById  = {}; bovinos.forEach(b => { if (b.id != null) idxById[b.id] = b; });
  const envolvidos = (e.bovinoIds||[]).map(id => idxById[id]).filter(Boolean);
  const ico = tipoIco(e.tipo);

  const animaisList = envolvidos.length
    ? envolvidos.map((b,i) => {
        const ek = `edrw_${i}`; dm[ek] = b;
        return `<div class="mini-row" style="cursor:pointer" onclick="openBovinoDetail('${ek}')">
          <span class="mini-brinco">${b.numeroBrinco||'—'}</span>
          <span class="mini-cat">${b.categoria||'—'}</span>
          <span class="mini-peso">${b.pesoAtualKg ? b.pesoAtualKg+' kg' : '—'}</span>
        </div>`;
      }).join('')
    : `<p style="font-size:13px;color:var(--muted);padding:16px 0">Sem animais vinculados.</p>`;

  const campo = (lbl, val) => val ? `<div class="drw-field"><label>${lbl}</label><span>${val}</span></div>` : '';
  const invNome = invMap[e.invernadaId] || null;

  openDrawer(ico, e.tipo||'Evento', e.dataEvento||'', `
    <div class="drw-section">
      <div style="text-align:center;padding:16px 0 8px">
        <div style="font-size:56px;margin-bottom:8px">${ico}</div>
        <div style="font-size:20px;font-weight:800">${e.tipo||'Evento'}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:4px">${e.dataEvento||''}</div>
      </div>
    </div>
    <div class="drw-section">
      <div class="drw-section-title">Detalhes</div>
      <div class="drw-grid">
        ${campo('Produto',    e.produtoUtilizado)}
        ${campo('Dosagem',    e.dosagem)}
        ${campo('Responsável',e.responsavel)}
        ${campo('Invernada',  invNome)}
        ${e.observacoes ? `<div class="drw-field full"><label>Observações</label><span>${e.observacoes}</span></div>` : ''}
      </div>
    </div>
    <div class="drw-section">
      <div class="drw-section-title">Animais envolvidos (${envolvidos.length})</div>
      ${animaisList}
    </div>
  `);
};
</script>
