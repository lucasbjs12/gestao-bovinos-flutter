name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar sqlite (necessário para os testes de repositório)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      # Os passos abaixo só rodam se o secret GOOGLE_SERVICES_JSON estiver
      # configurado no repositório (Settings > Secrets and variables > Actions).
      - name: Restaurar google-services.json
        if: env.GOOGLE_SERVICES_JSON != ''
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json

      - name: Build APK debug
        if: env.GOOGLE_SERVICES_JSON != ''
        run: flutter build apk --debug

      - name: Publicar APK como artefato
        if: env.GOOGLE_SERVICES_JSON != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
